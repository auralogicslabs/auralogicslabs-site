    </radialGradient>
    <radialGradient id="vi" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6D5EFA" stop-opacity="0.10"/><stop offset="100%" stop-color="#6D5EFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3B6DF5"/><stop offset="100%" stop-color="#1A3FD8"/></linearGradient>
    <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/></pattern>
