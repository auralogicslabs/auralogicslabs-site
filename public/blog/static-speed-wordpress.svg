  <circle cx="124" cy="90" r="5" fill="#3B6DF5"/>
  <text x="142" y="95" fill="#C7C9D9" font-size="15" font-weight="700" letter-spacing="2">NEXORA ENGINE · STATIC DELIVERY</text>

