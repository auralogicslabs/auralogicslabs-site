  <rect x="140" y="404" width="820" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.05"/>
  <rect x="140" y="404" width="46" height="22" rx="11" fill="url(#bl)"/>
  <text x="980" y="421" fill="#7FA0FF" font-size="15" font-weight="800">22ms</text>

