  <rect x="978" y="206" width="90" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.07"/>
  <text x="1023" y="225" fill="#B6BECC" font-size="12" font-weight="700" text-anchor="middle">Live · PHP</text>

  <!-- line items -->
  <g transform="translate(662,256)">
    <rect width="406" height="56" rx="12" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <rect x="12" y="12" width="32" height="32" rx="8" fill="url(#thumb)"/>
    <rect x="56" y="16" width="150" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.18"/>
    <rect x="56" y="34" width="90" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.10"/>
    <text x="394" y="34" fill="#E7E8F0" font-size="14" font-weight="700" text-anchor="end">$29</text>
  </g>
  <g transform="translate(662,322)">
    <rect width="406" height="56" rx="12" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <rect x="12" y="12" width="32" height="32" rx="8" fill="url(#thumb)"/>
    <rect x="56" y="16" width="120" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.18"/>
    <rect x="56" y="34" width="74" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.10"/>
    <text x="394" y="34" fill="#E7E8F0" font-size="14" font-weight="700" text-anchor="end">$19</text>
  </g>

  <!-- total -->
  <line x1="662" y1="398" x2="1068" y2="398" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="662" y="424" fill="#8A8C9E" font-size="14" font-weight="600">Total</text>
  <text x="1068" y="424" fill="#FFFFFF" font-size="18" font-weight="800" text-anchor="end">$48</text>

  <!-- checkout button -->
  <rect x="662" y="442" width="406" height="44" rx="12" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="865" y="470" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Checkout →</text>

  <text x="1110" y="600" fill="#FFFFFF" fill-opacity="0.45" font-size="15" font-weight="700" text-anchor="end" letter-spacing="1">Auralogics Labs</text>
</svg>
