<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', ui-sans-serif, system-ui, sans-serif">
  <defs>
    <radialGradient id="ac" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F39A09" stop-opacity="0.14"/><stop offset="100%" stop-color="#F39A09" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vi" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6D5EFA" stop-opacity="0.10"/><stop offset="100%" stop-color="#6D5EFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="thumb" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F39A09" stop-opacity="0.22"/><stop offset="100%" stop-color="#F39A09" stop-opacity="0.06"/></linearGradient>
    <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="#0B0B16"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <ellipse cx="280" cy="130" rx="430" ry="300" fill="url(#ac)"/>
  <ellipse cx="980" cy="540" rx="400" ry="280" fill="url(#vi)"/>

  <!-- eyebrow -->
  <rect x="100" y="68" width="312" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <circle cx="124" cy="88" r="5" fill="#F39A09"/>
  <text x="142" y="93" fill="#C7C9D9" font-size="15" font-weight="700" letter-spacing="2">NEXORA ENGINE · WOOCOMMERCE</text>
  <text x="100" y="160" fill="#8A8C9E" font-size="14">Session-aware routing — cache the catalog, keep checkout live</text>

  <!-- LEFT: static catalog (product grid) -->
  <rect x="100" y="186" width="470" height="320" rx="22" fill="#14141F" stroke="#F39A09" stroke-opacity="0.30"/>
  <text x="132" y="224" fill="#FFFFFF" font-size="17" font-weight="700">Catalog</text>
  <rect x="430" y="206" width="116" height="28" rx="14" fill="#F39A09" fill-opacity="0.14"/>
  <text x="488" y="225" fill="#FBBF24" font-size="12" font-weight="700" text-anchor="middle">Static · 22ms</text>

  <!-- product cards -->
  <g>
