    <g transform="translate(132,250)">
      <rect width="128" height="226" rx="14" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.07"/>
      <rect x="12" y="12" width="104" height="120" rx="10" fill="url(#thumb)"/>
      <circle cx="44" cy="48" r="11" fill="#F39A09" fill-opacity="0.5"/>
      <path d="M24 92 l24 -28 l18 18 l14 -12 l24 22 Z" fill="#F39A09" fill-opacity="0.35"/>
      <rect x="12" y="146" width="80" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="12" y="166" width="54" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.10"/>
      <text x="12" y="206" fill="#FBBF24" font-size="15" font-weight="800">$29</text>
      <rect x="74" y="190" width="42" height="22" rx="11" fill="#F39A09" fill-opacity="0.16"/>
      <text x="95" y="205" fill="#FBBF24" font-size="10" font-weight="700" text-anchor="middle">Add</text>
    </g>
    <!-- card 2 -->
    <g transform="translate(271,250)">
      <rect width="128" height="226" rx="14" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.07"/>
      <rect x="12" y="12" width="104" height="120" rx="10" fill="url(#thumb)"/>
      <circle cx="44" cy="48" r="11" fill="#F39A09" fill-opacity="0.5"/>
      <path d="M24 92 l24 -28 l18 18 l14 -12 l24 22 Z" fill="#F39A09" fill-opacity="0.35"/>
      <rect x="12" y="146" width="72" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="12" y="166" width="48" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.10"/>
      <text x="12" y="206" fill="#FBBF24" font-size="15" font-weight="800">$49</text>
      <rect x="74" y="190" width="42" height="22" rx="11" fill="#F39A09" fill-opacity="0.16"/>
      <text x="95" y="205" fill="#FBBF24" font-size="10" font-weight="700" text-anchor="middle">Add</text>
    </g>
    <!-- card 3 -->
    <g transform="translate(410,250)">
      <rect width="128" height="226" rx="14" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.07"/>
      <rect x="12" y="12" width="104" height="120" rx="10" fill="url(#thumb)"/>
      <circle cx="44" cy="48" r="11" fill="#F39A09" fill-opacity="0.5"/>
      <path d="M24 92 l24 -28 l18 18 l14 -12 l24 22 Z" fill="#F39A09" fill-opacity="0.35"/>
      <rect x="12" y="146" width="78" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="12" y="166" width="44" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.10"/>
      <text x="12" y="206" fill="#FBBF24" font-size="15" font-weight="800">$19</text>
      <rect x="74" y="190" width="42" height="22" rx="11" fill="#F39A09" fill-opacity="0.16"/>
      <text x="95" y="205" fill="#FBBF24" font-size="10" font-weight="700" text-anchor="middle">Add</text>
