<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', ui-sans-serif, system-ui, sans-serif">
  <defs>
    <radialGradient id="ac" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vi" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6D5EFA" stop-opacity="0.10"/><stop offset="100%" stop-color="#6D5EFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10B981" stop-opacity="0.28"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></linearGradient>
    <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="#0B0B16"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <ellipse cx="300" cy="120" rx="440" ry="300" fill="url(#ac)"/>
  <ellipse cx="980" cy="540" rx="400" ry="280" fill="url(#vi)"/>

  <rect x="100" y="70" width="320" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <circle cx="124" cy="90" r="5" fill="#10B981"/>
  <text x="142" y="95" fill="#C7C9D9" font-size="15" font-weight="700" letter-spacing="2">PERFORMANCE · CORE WEB VITALS</text>

  <!-- chart panel -->
  <rect x="100" y="184" width="1000" height="300" rx="22" fill="#14141F" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="140" y="230" fill="#FFFFFF" font-size="20" font-weight="700">TTFB drives LCP</text>
  <text x="140" y="252" fill="#8A8C9E" font-size="13">Lower server response → faster Largest Contentful Paint</text>

  <!-- axes -->
  <line x1="160" y1="450" x2="1060" y2="450" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <line x1="160" y1="280" x2="160" y2="450" stroke="#FFFFFF" stroke-opacity="0.12"/>

  <!-- area + curve (LCP falls as TTFB drops) -->
  <path d="M180,300 C320,310 430,360 560,395 C700,432 860,438 1040,440 L1040,450 L180,450 Z" fill="url(#area)"/>
  <path d="M180,300 C320,310 430,360 560,395 C700,432 860,438 1040,440" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>

  <!-- marker at fast end -->
  <circle cx="1040" cy="440" r="7" fill="#10B981"/>
  <circle cx="1040" cy="440" r="13" fill="#10B981" fill-opacity="0.2"/>
  <rect x="928" y="392" width="150" height="34" rx="10" fill="#10B981" fill-opacity="0.12"/>
  <text x="1003" y="414" fill="#34D399" font-size="13" font-weight="700" text-anchor="middle">22ms · LCP good</text>

  <!-- slow end label -->
  <text x="186" y="290" fill="#B6BECC" font-size="13" font-weight="600">Poor LCP</text>
  <text x="180" y="474" fill="#8A8C9E" font-size="12">800ms</text>
  <text x="1014" y="474" fill="#8A8C9E" font-size="12">22ms</text>

  <text x="1110" y="592" fill="#FFFFFF" fill-opacity="0.45" font-size="15" font-weight="700" text-anchor="end" letter-spacing="1">Auralogics Labs</text>
</svg>
