<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', ui-sans-serif, system-ui, sans-serif">
  <defs>
    <radialGradient id="glowTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6D5EFA" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#6D5EFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tealLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#13716A"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1200" height="630" fill="#0B0B16"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="250" cy="110" rx="460" ry="320" fill="url(#glowTeal)"/>
  <ellipse cx="1010" cy="540" rx="440" ry="320" fill="url(#glowViolet)"/>

  <!-- eyebrow pill -->
  <g>
    <rect x="100" y="68" width="338" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <circle cx="124" cy="88" r="5" fill="#2DD4BF"/>
    <text x="142" y="93" fill="#C7C9D9" font-size="15" font-weight="700" letter-spacing="2">NEXORA PULSE · INDEX DOCTOR</text>
  </g>

  <!-- coverage panel -->
  <g>
    <rect x="100" y="176" width="640" height="368" rx="22" fill="#14141F" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="132" y="224" fill="#FFFFFF" font-size="22" font-weight="700">Coverage</text>
    <text x="132" y="248" fill="#8A8C9E" font-size="14" font-weight="500">URL Inspection · 60 pages</text>
    <rect x="600" y="200" width="108" height="34" rx="17" fill="#2DD4BF" fill-opacity="0.12"/>
    <text x="654" y="222" fill="#5EEAD4" font-size="13" font-weight="700" text-anchor="middle">Live · GSC</text>

    <!-- row 1 indexed -->
    <g transform="translate(0,286)">
      <rect x="132" y="-2" width="320" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.14"/>
      <rect x="556" y="-12" width="152" height="34" rx="17" fill="#34D399" fill-opacity="0.14"/>
      <path d="M576 5 l8 8 l14 -16" stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="606" y="10" fill="#34D399" font-size="14" font-weight="700">Indexed</text>
    </g>
    <!-- row 2 indexed -->
    <g transform="translate(0,344)">
      <rect x="132" y="-2" width="260" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.14"/>
      <rect x="556" y="-12" width="152" height="34" rx="17" fill="#34D399" fill-opacity="0.14"/>
      <path d="M576 5 l8 8 l14 -16" stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="606" y="10" fill="#34D399" font-size="14" font-weight="700">Indexed</text>
    </g>
    <!-- row 3 NOT indexed (highlighted) -->
    <g transform="translate(0,402)">
      <rect x="116" y="-22" width="608" height="54" rx="14" fill="#FBBF24" fill-opacity="0.06" stroke="#FBBF24" stroke-opacity="0.45"/>
      <rect x="132" y="-2" width="300" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.22"/>
      <rect x="540" y="-12" width="168" height="34" rx="17" fill="#FBBF24" fill-opacity="0.16"/>
      <text x="560" y="10" fill="#FBBF24" font-size="14" font-weight="700">Not indexed</text>
    </g>
    <!-- row 4 crawled -->
    <g transform="translate(0,470)">
      <rect x="132" y="-2" width="230" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="556" y="-12" width="152" height="34" rx="17" fill="#94A3B8" fill-opacity="0.14"/>
      <text x="582" y="10" fill="#B6BECC" font-size="14" font-weight="700">Crawled</text>
    </g>
  </g>

  <!-- connector -->
  <path d="M748 400 C 790 400, 800 360, 832 360" stroke="#2DD4BF" stroke-opacity="0.5" stroke-width="2" fill="none" stroke-dasharray="2 6" stroke-linecap="round"/>
  <path d="M828 354 l10 6 l-10 6" stroke="#2DD4BF" stroke-opacity="0.7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- diagnosis card -->
  <g>
    <rect x="828" y="226" width="282" height="270" rx="20" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="828" y="226" width="6" height="270" rx="3" fill="url(#tealLine)"/>
    <text x="860" y="270" fill="#FFFFFF" font-size="19" font-weight="700">Diagnosis</text>

    <text x="860" y="312" fill="#8A8C9E" font-size="13" font-weight="600" letter-spacing="1">VERDICT</text>
    <text x="860" y="336" fill="#E7E8F0" font-size="16" font-weight="600">Crawled, not indexed</text>

    <text x="860" y="378" fill="#8A8C9E" font-size="13" font-weight="600" letter-spacing="1">PATTERN</text>
    <text x="860" y="402" fill="#E7E8F0" font-size="16" font-weight="600">Under 300 words</text>

    <text x="860" y="444" fill="#8A8C9E" font-size="13" font-weight="600" letter-spacing="1">AFFECTED</text>
    <text x="860" y="468" fill="#5EEAD4" font-size="16" font-weight="700">9 of 13 pages</text>
  </g>

  <!-- pulse line -->
  <path d="M100 588 H470 l16 -26 l22 52 l20 -40 l16 14 H760" stroke="url(#tealLine)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- wordmark -->
  <text x="1110" y="592" fill="#FFFFFF" fill-opacity="0.45" font-size="15" font-weight="700" text-anchor="end" letter-spacing="1">Auralogics Labs</text>
</svg>
